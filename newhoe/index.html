<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Humanizer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>AI Text <span>Humanizer</span></h1>
            <p>Transform robotic, detectable AI text into natural, nuanced human writing.</p>
        </header>

        <main class="workspace">
            <div class="panel input-panel">
                <div class="panel-header">
                    <h2>Original Text</h2>
                    <span class="badge ai-badge">AI Generated</span>
                </div>
                <textarea id="ai-input" placeholder="Paste your AI-generated text here..."></textarea>
                <div class="panel-footer">
                    <span class="word-count" id="input-words">0 words</span>
                    <button id="clear-btn" class="btn secondary">Clear</button>
                </div>
            </div>

            <div class="controls-area">
                <div class="settings-panel">
                    <label for="ai-target">Max AI Score Allowed:</label>
                    <div class="target-input-wrapper">
                        <input type="number" id="ai-target" min="0" max="100" value="15">
                        <span class="percent-symbol">%</span>
                    </div>
                    <div class="tool-tip">Will auto-loop until below this %</div>
                </div>

                <button id="humanize-btn" class="btn primary glowing-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 8L16 12L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M8 12H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Humanize Text
                </button>
            </div>

            <div class="panel output-panel">
                <div class="panel-header">
                    <h2>Humanized Output</h2>
                    <span class="badge human-badge">Human-like</span>
                </div>
                <div id="output-loader" class="loader hidden">
                    <div class="spinner"></div>
                    <p>Applying intellectual hesitation and structural variation...</p>
                </div>
                <textarea id="human-output" placeholder="Your humanized text will appear here..." readonly></textarea>
                <div class="panel-footer output-meta">
                    <div class="stats-group">
                        <span class="word-count" id="output-words">0 words</span>
                        <div class="ai-score-display hidden" id="score-container">
                            AI Confidence: <span id="current-ai-score" class="score-value">--%</span>
                        </div>
                    </div>
                    <button id="copy-btn" class="btn secondary">Copy</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
